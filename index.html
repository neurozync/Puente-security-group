<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Security Training Schedule</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js"></script>

<style>

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #f4f6f8;
  color: #1f2933;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 15px;
}

.header {
  background: #1f3a5f;
  color: #fff;
  padding: 15px;
}

.header-title {
  font-size: 18px;
  font-weight: bold;
}

.header-sub {
  font-size: 12px;
  opacity: 0.85;
}

.card {
  background: #fff;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  margin-top: 15px;
  padding: 15px;
}

#calendar {
  width: 100%;
}

.fc-toolbar-title {
  font-size: 16px !important;
  font-weight: bold;
}

.fc-button {
  background: #1f3a5f !important;
  border: none !important;
  color: #fff !important;
  font-size: 12px !important;
}

.fc-button:hover {
  background: #162c47 !important;
}

.fc-day-today {
  background: #e8f0ff !important;
}

.fc-event {
  color: #fff !important;
  border: none !important;
  padding: 3px;
}

.open { background: #16a34a !important; }
.limited { background: #f59e0b !important; }
.closed { background: #dc2626 !important; }

.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 9999;
}

.modal-box {
  background: #fff;
  max-width: 400px;
  margin: 20% auto;
  padding: 20px;
  border-radius: 6px;
}

.modal-title {
  font-weight: bold;
  margin-bottom: 10px;
}

.close-btn {
  margin-top: 10px;
  padding: 8px;
  background: #1f3a5f;
  color: #fff;
  border: none;
}

.info {
  font-size: 14px;
  line-height: 1.5;
}

@media (min-width: 768px) {
  .header-title { font-size: 22px; }
  .fc-toolbar-title { font-size: 18px !important; }
}

</style>
</head>

<body>

<div class="header">
  <div class="container">
    <div class="header-title">Security Training</div>
    <div class="header-sub">Official Course Schedule</div>
  </div>
</div>

<div class="container">

  <div class="card">
    <h3>Training Calendar</h3>
    <div id="calendar"></div>
  </div>

  <div class="card">
    <h3>Information</h3>
    <div class="info">
      All students must arrive 15 minutes early.<br>
      Bring valid government-issued identification.<br>
      Contact the office for scheduling or questions.
    </div>

    <!-- CONTACT BUTTON ADDED -->
    <button onclick="openContact()" style="
      margin-top:15px;
      padding:10px 14px;
      background:#1f3a5f;
      color:#fff;
      border:none;
      border-radius:4px;
      font-weight:bold;
      cursor:pointer;
    ">
      Contact / Request Training
    </button>

  </div>

</div>

<!-- ORIGINAL MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">
    <div id="modal-title" class="modal-title"></div>
    <div id="modal-date"></div>
    <div id="modal-desc" style="margin-top:10px;"></div>
    <button class="close-btn" onclick="closeModal()">Close</button>
  </div>
</div>

<!-- CONTACT MODAL ADDED -->
<div id="contactModal" class="modal">
  <div class="modal-box">

    <div class="modal-title">Contact / Training Request</div>

    <form action="https://formsubmit.co/Andr0idman062@gmail.com" method="POST">

      <input type="hidden" name="_captcha" value="true">
      <input type="text" name="_honey" style="display:none">
      <input type="hidden" name="_subject" value="New Training Inquiry">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="_autoresponse" value="We received your request. Most responses are handled within 24–48 hours.">

      <input type="text" name="name" placeholder="Name (Required)" required style="width:100%;margin-top:8px;padding:8px;">
      <input type="tel" name="phone" placeholder="Phone Number" style="width:100%;margin-top:8px;padding:8px;">
      <input type="email" name="email" placeholder="Email (Required)" required style="width:100%;margin-top:8px;padding:8px;">

      <select name="class_interest" style="width:100%;margin-top:8px;padding:8px;">
        <option value="">Select Class</option>
        <option>Unarmed Guard Card</option>
        <option>Taser</option>
        <option>Handcuffing</option>
        <option>Baton</option>
        <option>OC Spray</option>
        <option>Other</option>
      </select>

      <textarea name="message" placeholder="Message" required style="width:100%;margin-top:8px;padding:8px;"></textarea>

      <button type="submit" style="
        margin-top:10px;
        padding:10px;
        width:100%;
        background:#1f3a5f;
        color:#fff;
        border:none;
      ">
        Submit Request
      </button>

      <button type="button" onclick="closeContact()" class="close-btn">
        Cancel
      </button>

    </form>
  </div>
</div>

<script>

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

function openContact() {
  document.getElementById('contactModal').style.display = 'block';
}

function closeContact() {
  document.getElementById('contactModal').style.display = 'none';
}

document.addEventListener('DOMContentLoaded', function () {

  const isMobile = window.innerWidth < 600;

  const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {

    initialView: isMobile ? 'listMonth' : 'dayGridMonth',
    height: 'auto',

    headerToolbar: {
      left: 'prev,next today',
      center: 'title',
      right: isMobile ? '' : 'dayGridMonth,timeGridWeek'
    },

    events: [
      {
        title: 'Unarmed Guard Class',
        start: '2026-04-20T09:00:00',
        end: '2026-04-20T17:00:00',
        classNames: ['closed'],
        extendedProps: {
          description: 'Class Full',
          status: 'CLOSED'
        }
      },
      {
        title: 'Handcuffing',
        start: '2026-04-27T10:00:00',
        end: '2026-04-27T14:00:00',
        classNames: ['closed'],
        extendedProps: {
          description: 'Class Full',
          status: 'CLOSED'
        }
      },
      {
        title: 'Taser',
        start: '2026-05-02T08:00:00',
        end: '2026-05-02T12:00:00',
        classNames: ['closed'],
        extendedProps: {
          description: 'Class Full',
          status: 'CLOSED'
        }
      }
    ],

    eventClick: function(info) {

      document.getElementById('modal-title').innerText = info.event.title;
      document.getElementById('modal-date').innerText = info.event.start.toLocaleString();

      document.getElementById('modal-desc').innerText =
        "Status: " + info.event.extendedProps.status + "\n\n" +
        info.event.extendedProps.description;

      document.getElementById('modal').style.display = 'block';
    }

  });

  calendar.render();

  window.onclick = function(e) {
    if (e.target === document.getElementById('modal')) closeModal();
    if (e.target === document.getElementById('contactModal')) closeContact();
  };

});

</script>

</body>
</html>
