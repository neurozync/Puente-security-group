<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Security Training Schedule</title>

<!-- CALENDAR LIBRARY -->
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js"></script>

<style>

/* ============================= */
/* BASE / MOBILE FIRST           */
/* ============================= */
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #f4f6f8;
  color: #1f2933;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 15px;
}

/* ============================= */
/* HEADER                        */
/* ============================= */
.header {
  background: #1f3a5f;
  color: #fff;
  padding: 15px;
}

.header-title {
  font-size: 18px;
  font-weight: bold;
}

.header-sub {
  font-size: 12px;
  opacity: 0.85;
}

/* ============================= */
/* SECTION CARD                  */
/* ============================= */
.card {
  background: #fff;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  margin-top: 15px;
  padding: 15px;
}

/* ============================= */
/* CALENDAR                      */
/* ============================= */
#calendar {
  width: 100%;
}

.fc-toolbar-title {
  font-size: 16px !important;
  font-weight: bold;
}

.fc-button {
  background: #1f3a5f !important;
  border: none !important;
  color: #fff !important;
  font-size: 12px !important;
}

.fc-button:hover {
  background: #162c47 !important;
}

.fc-day-today {
  background: #e8f0ff !important;
}

.fc-event {
  background: #1f5a96 !important;
  border: none !important;
  color: #fff !important;
  padding: 3px;
}

/* ============================= */
/* MODAL                         */
/* ============================= */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 9999;
}

.modal-box {
  background: #fff;
  max-width: 400px;
  margin: 20% auto;
  padding: 20px;
  border-radius: 6px;
}

.modal-title {
  font-weight: bold;
  margin-bottom: 10px;
}

.close-btn {
  margin-top: 10px;
  padding: 8px;
  background: #1f3a5f;
  color: #fff;
  border: none;
}

/* ============================= */
/* INFO SECTION                  */
/* ============================= */
.info {
  font-size: 14px;
  line-height: 1.5;
}

/* ============================= */
/* DESKTOP                      */
/* ============================= */
@media (min-width: 768px) {

  .header-title {
    font-size: 22px;
  }

  .fc-toolbar-title {
    font-size: 18px !important;
  }

}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="container">
    <div class="header-title">Security Training Division</div>
    <div class="header-sub">Official Course Schedule</div>
  </div>
</div>

<!-- MAIN -->
<div class="container">

  <!-- CALENDAR CARD -->
  <div class="card">
    <h3>Training Calendar</h3>
    <div id="calendar"></div>
  </div>

  <!-- INFO CARD -->
  <div class="card">
    <h3>Information</h3>
    <div class="info">
      All students must arrive 15 minutes early.<br>
      Bring valid government-issued identification.<br>
      Contact the office for scheduling or questions.
    </div>
  </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">
    <div id="modal-title" class="modal-title"></div>
    <div id="modal-date"></div>
    <div id="modal-desc" style="margin-top:10px;"></div>
    <button class="close-btn" onclick="closeModal()">Close</button>
  </div>
</div>

<script>

/* ============================= */
/* MODAL FUNCTIONS               */
/* ============================= */
function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

/* ============================= */
/* INIT CALENDAR                 */
/* ============================= */
document.addEventListener('DOMContentLoaded', function () {

  const isMobile = window.innerWidth < 600;

  const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {

    initialView: isMobile ? 'listMonth' : 'dayGridMonth',

    height: 'auto',

    headerToolbar: {
      left: 'prev,next today',
      center: 'title',
      right: isMobile ? '' : 'dayGridMonth,timeGridWeek'
    },

    events: [

      {
        title: 'Guard Card Certification',
        start: '2026-04-20T09:00:00',
        end: '2026-04-20T17:00:00',
        extendedProps: {
          description: '8-hour unarmed certification. Bring ID.'
        }
      },

      {
        title: 'Armed Guard Refresher',
        start: '2026-04-27T10:00:00',
        end: '2026-04-27T14:00:00',
        extendedProps: {
          description: 'Firearms refresher and qualification.'
        }
      },

      {
        title: 'CPR / First Aid',
        start: '2026-05-02T08:00:00',
        end: '2026-05-02T12:00:00',
        extendedProps: {
          description: 'CPR and First Aid certification.'
        }
      }

    ],

    eventClick: function(info) {

      document.getElementById('modal-title').innerText = info.event.title;
      document.getElementById('modal-date').innerText = info.event.start.toLocaleString();
      document.getElementById('modal-desc').innerText = info.event.extendedProps.description;

      document.getElementById('modal').style.display = 'block';
    }

  });

  calendar.render();

  window.onclick = function(e) {
    if (e.target === document.getElementById('modal')) {
      closeModal();
    }
  };

});

</script>

</body>
</html>
